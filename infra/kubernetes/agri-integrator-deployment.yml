---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agri-integrator-config
  namespace: foodsecuritynet
data:
  SPRING_PROFILES_ACTIVE: "production"
  POSTGRES_HOST: "postgres"
  REDIS_HOST: "redis"
  SERVER_PORT: "8082"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: agri-integrator-secret
  namespace: foodsecuritynet
type: Opaque
stringData:
  POSTGRES_PASSWORD: changeme-in-production
  API_KEYS: your-external-api-keys

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agri-data-pvc
  namespace: foodsecuritynet
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agri-integrator
  namespace: foodsecuritynet
  labels:
    app: agri-integrator
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agri-integrator
  template:
    metadata:
      labels:
        app: agri-integrator
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
      - name: agri-integrator
        image: foodsecuritynet/agri-integrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: agri-integrator-config
        - secretRef:
            name: agri-integrator-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
        - name: agri-data
          mountPath: /app/data
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: agri-data
        persistentVolumeClaim:
          claimName: agri-data-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - agri-integrator
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: agri-integrator
  namespace: foodsecuritynet
  labels:
    app: agri-integrator
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 8082
    targetPort: 8082
    protocol: TCP
    name: http
  selector:
    app: agri-integrator

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agri-integrator-hpa
  namespace: foodsecuritynet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agri-integrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
