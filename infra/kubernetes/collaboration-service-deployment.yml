---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collaboration-service-config
  namespace: foodsecuritynet
data:
  SPRING_PROFILES_ACTIVE: "production"
  REDIS_HOST: "redis"
  SERVER_PORT: "8086"
  LOG_LEVEL: "INFO"
  WEBSOCKET_ENABLED: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collaboration-service
  namespace: foodsecuritynet
  labels:
    app: collaboration-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: collaboration-service
  template:
    metadata:
      labels:
        app: collaboration-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8086"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
      - name: collaboration-service
        image: foodsecuritynet/collaboration-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8086
          name: http
          protocol: TCP
        - containerPort: 8087
          name: websocket
          protocol: TCP
        envFrom:
        - configMapRef:
            name: collaboration-service-config
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "896Mi"
            cpu: "800m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - collaboration-service
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: collaboration-service
  namespace: foodsecuritynet
  labels:
    app: collaboration-service
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 8086
    targetPort: 8086
    protocol: TCP
    name: http
  - port: 8087
    targetPort: 8087
    protocol: TCP
    name: websocket
  selector:
    app: collaboration-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: collaboration-service-hpa
  namespace: foodsecuritynet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: collaboration-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
