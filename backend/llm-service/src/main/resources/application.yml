spring:
  application:
    name: llm-service
  datasource:
    url: jdbc:postgresql://localhost:5432/foodsecuritynet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8084
  servlet:
    context-path: /llm-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.foodsecuritynet.llm: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/llm-service.log

app:
  llm:
    api-url: https://api.openai.com/v1/chat/completions
    api-key: ${LLM_API_KEY:}
    model: gpt-3.5-turbo
    timeout-seconds: 30
    max-tokens: 1000
  mbti:
    enabled: true
  troubleshooting:
    enabled: true
