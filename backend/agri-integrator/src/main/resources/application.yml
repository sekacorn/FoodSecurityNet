spring:
  application:
    name: agri-integrator
  datasource:
    url: jdbc:postgresql://localhost:5432/foodsecuritynet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  security:
    user:
      name: admin
      password: admin123

server:
  port: 8081
  servlet:
    context-path: /agri-integrator

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

logging:
  level:
    com.foodsecuritynet.agriintegrator: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agri-integrator.log

app:
  csv:
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
  validation:
    strict-mode: true
  integration:
    batch-size: 1000
