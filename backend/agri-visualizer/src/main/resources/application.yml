spring:
  application:
    name: agri-visualizer
  datasource:
    url: jdbc:postgresql://localhost:5432/foodsecuritynet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8082
  servlet:
    context-path: /agri-visualizer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.foodsecuritynet.agrivisualizer: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agri-visualizer.log

app:
  ai-service:
    url: http://localhost:8084
  visualization:
    max-concurrent-jobs: 10
    default-resolution: high
  export:
    max-file-size-mb: 100
