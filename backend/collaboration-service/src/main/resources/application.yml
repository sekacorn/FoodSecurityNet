spring:
  application:
    name: collaboration-service
  datasource:
    url: jdbc:postgresql://localhost:5432/foodsecuritynet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 60000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8086
  servlet:
    context-path: /collaboration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

logging:
  level:
    com.foodsecuritynet.collaboration: DEBUG
    org.springframework.web: INFO
    org.springframework.messaging: DEBUG
    org.springframework.web.socket: DEBUG
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/collaboration-service.log

app:
  websocket:
    allowed-origins: "*"
    session-timeout-minutes: 120
  collaboration:
    max-users-per-session: 50
    history-retention-days: 30
